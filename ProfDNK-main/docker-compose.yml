version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: profdnk_db
    environment:
      POSTGRES_USER: profdnk
      POSTGRES_PASSWORD: profdnk_password
      POSTGRES_DB: profdnk_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U profdnk"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: profdnk_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://profdnk:profdnk_password@db:5432/profdnk_db

  frontend:
    build: ./frontend
    container_name: profdnk_frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

volumes:
  postgres_data:
